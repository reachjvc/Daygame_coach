name: E2E Tests

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  e2e-chromium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chromium)
        run: npx playwright test --project=setup --project=setup-user-b --project=chromium --project=no-auth --project=security-multi-user --project='goals-*' --project='session-*' --project=auth-destructive
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 7

  e2e-cross-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Run cross-browser E2E tests
        run: npx playwright test --project=smoke-firefox --project=smoke-webkit --project=smoke-iphone --project=smoke-android --project=goals-mobile-iphone --project=goals-mobile-pixel --project=goals-safari --project=tracking-mobile-iphone --project=tracking-mobile-pixel --project=tracking-safari --project=scenarios-mobile-iphone --project=scenarios-mobile-pixel --project=scenarios-safari --project=mobile-navigation-iphone --project=mobile-navigation-pixel
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-cross-browser
          path: playwright-report/
          retention-days: 7
